version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: consentledger-db
    environment:
      POSTGRES_DB: consentledger
      POSTGRES_USER: consentledger
      POSTGRES_PASSWORD: consentledger_pw
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U consentledger"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: consentledger-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@consentledger.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
