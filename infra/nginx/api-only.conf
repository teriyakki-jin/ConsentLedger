# API-only nginx config for AWS deployment.
# Frontend is served via S3 + CloudFront.
# This server only proxies Spring Boot API calls.
#
# CloudFront behavior rules:
#   /api/*  → EC2 (this nginx) as origin
#   /*      → S3 bucket as origin

server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Content-Type-Options  nosniff;
    add_header X-Frame-Options         DENY;
    add_header Referrer-Policy         strict-origin-when-cross-origin;

    # CloudFront forwards X-Forwarded-For — trust it
    real_ip_header     X-Forwarded-For;
    set_real_ip_from   0.0.0.0/0;

    # CloudFront /api/* behavior → strip /api prefix → Spring Boot
    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass         http://app:8080;
        proxy_http_version 1.1;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        proxy_buffering off;
    }

    # Spring Boot API proxy
    location / {
        proxy_pass         http://app:8080;
        proxy_http_version 1.1;

        # SSE / WebSocket support
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

        # Long timeout for SSE streams (/sse endpoint)
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;

        # Disable buffering for SSE
        proxy_buffering off;
    }

    # Health check endpoint (used by EC2 ALB / CloudFront health check)
    location /actuator/health {
        proxy_pass http://app:8080/actuator/health;
        access_log off;
    }
}
