apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: consentledger-ingress
  namespace: consentledger
  labels:
    app.kubernetes.io/name: consentledger
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
    - host: consentledger.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: consentledger-backend
                port:
                  name: http
