apiVersion: v1
kind: ServiceAccount
metadata:
  name: consentledger-backend
  namespace: consentledger
  labels:
    app.kubernetes.io/name: consentledger
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: consentledger-backend-read-config
  namespace: consentledger
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["consentledger-config"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: consentledger-backend-read-config
  namespace: consentledger
subjects:
  - kind: ServiceAccount
    name: consentledger-backend
    namespace: consentledger
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: consentledger-backend-read-config
